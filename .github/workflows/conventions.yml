name: Conventions

on:
  workflow_call:

permissions:
  contents: read
  actions: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint-and-prune:
    name: Lint and Prune
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: '22'
          platform: 'linux-x64'

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: '23.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upgrade Rust to latest stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Rust Cargo and Build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-bin: false
          workspaces: packages/core-bridge -> target
          prefix-key: corebridge-buildcache
          shared-key: linux-x64
          env-vars: ''
          save-if: false

      - name: Generate code
        run: |
          pnpm run build:protos
          pnpm run build:system-nexus

      # eslint-import-resolver-typescript requires packages to be built
      - name: Compile all non-rust code
        run: pnpm --recursive --stream --filter '!@temporalio/core-bridge' --filter '!typescript-sdk' run build

      - name: Validate generated code
        run: git diff --exit-code -- packages/workflow/src/nexus/system/generated packages/worker/src/system-nexus-payload-visitor.ts

      - run: pnpm run lint:check
      - run: pnpm run lint:prune
