name: 'Setup Bun and Install Dependencies'
description: 'Sets up Bun runtime, configures cache, and installs dependencies'

inputs:
  bun-version:
    description: 'Version of Bun to install'
    required: false
    default: 'latest'
  platform:
    description: 'Platform identifier for cache key (e.g., linux-x64, macos-arm, windows-x64)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Install pnpm
      uses: pnpm/action-setup@6e7bdbda5fe05107efc88b23b7ed00aa05f84ca0 # v6
      with:
        version: '10'
        run_install: false

    - name: Install Node (needed for pnpm and some tooling)
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Get PNPM store directory
      id: pnpm-cache-dir
      shell: bash
      run: echo "dir=$(pnpm store path)" >> ${GITHUB_OUTPUT}

    - name: Restore PNPM store
      id: restore-cache
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: ${{ steps.pnpm-cache-dir.outputs.dir }}
        key: pnpm-bun-${{ inputs.platform }}-${{ hashFiles('./pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-bun-${{ inputs.platform }}-
          pnpm-main-${{ inputs.platform }}-

    - name: Download dependencies
      shell: bash
      run: |
        pnpm install --frozen-lockfile
