packages:
  - packages/activity
  - packages/ai-sdk
  - packages/client
  - packages/cloud
  - packages/common
  - packages/core-bridge
  - packages/create-project
  - packages/envconfig
  - packages/interceptors-opentelemetry
  - packages/lambda-worker
  - packages/meta
  - packages/nexus
  - packages/nyc-test-coverage
  - packages/plugin
  - packages/proto
  - packages/test
  - packages/testing
  - packages/worker
  - packages/workflow
  - scripts

ignoreScripts: true

# Minimum release age, in minutes (2 weeks)
minimumReleaseAge: 20160

# Allow depending on just published Temporal packages
minimumReleaseAgeExclude:
  - '@temporalio/*'
  - nexus-rpc

peerDependencyRules:
  ignoreMissing:
    # Peer of json-joy@9.9.1, missing in memfs@4.6.0
    # No apparent issue at runtime if not present
    - quill-delta

overrides:
  # verdaccio ^6.5.0 (from package.json) has no release older than 2 weeks;
  # pin to an aged version until 6.5.x ages into the minimumReleaseAge window.
  verdaccio: ^6.2.2
  # express 4.21.2 pins qs to exactly 6.13.0; force patched version.
  # Can be removed once verdaccio ships with a newer express (4.22.x uses ~6.14.0).
  qs: '>=6.14.2'
  'minimatch@>=7.0.0 <7.4.8': '>=7.4.8'
  serialize-javascript: '>=7.0.5'
  handlebars: '>=4.7.9'
  # verdaccio pins lodash to exactly 4.17.21; force patched version
  'lodash@<4.18.0': '>=4.18.0'
  # express 4.21.2 pins path-to-regexp to exactly 0.1.12; force patched 0.1.x
  'path-to-regexp@<0.1.13': '^0.1.13'

patchedDependencies:
  protobufjs@7.5.5: patches/protobufjs@7.5.5.patch
